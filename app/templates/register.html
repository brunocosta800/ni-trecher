{% extends "base.html" %}

{% block title %}Registro - DBQP{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Criar Conta</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" class="form-control" required placeholder="Seu nome">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" required
                    placeholder="Mínimo 6 caracteres" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Finalizar
                Registro</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Já possui uma conta? <a href="{{ url_for('auth.login') }}"
                style="color: var(--primary); text-decoration: none;">Faça login aqui</a>
        </p>
    </div>
</div>
{% endblock %}
