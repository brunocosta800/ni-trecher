{% extends "base.html" %}

{% block title %}Login - DBQP{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Entrar</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" autocomplete="email" id="email" name="email" class="form-control" required
                    placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" required placeholder="Sua senha">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Acessar
                Sistema</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Ainda não tem conta? <a href="{{ url_for('auth.register') }}"
                style="color: var(--primary); text-decoration: none;">Registre-se aqui</a>
        </p>
    </div>
</div>
{% endblock %}
